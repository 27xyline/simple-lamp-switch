<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Роборука</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f4f4f4;
            color: #1f2933;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(420px, 100%);
            padding: 24px;
            border: 1px solid #d8d8d8;
            border-radius: 8px;
            background: #ffffff;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }

        .status {
            margin: 0 0 20px;
            font-size: 20px;
        }

        #state {
            font-weight: 700;
        }

        .buttons {
            display: grid;
            gap: 10px;
        }

        button {
            min-height: 48px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            font: inherit;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

    </style>
</head>
<body>
    <main>
        <h1>Управление роборукой</h1>

        <p class="status">Состояние: <span id="state">загрузка</span></p>

        <div class="buttons">
            <button type="button" data-action="/close">Сжать руку</button>
            <button type="button" data-action="/open">Разжать руку</button>
        </div>
    </main>

    <script>
        const stateText = document.getElementById("state");
        const buttons = document.querySelectorAll("button[data-action]");

        function renderStatus(data) {
            stateText.textContent = data.is_closed ? "сжата" : "разжата";
        }

        async function loadStatus() {
            const response = await fetch("/status");
            renderStatus(await response.json());
        }

        async function sendAction(action) {
            buttons.forEach((button) => {
                button.disabled = true;
            });

            try {
                const response = await fetch(action, { method: "POST" });
                renderStatus(await response.json());
            } finally {
                buttons.forEach((button) => {
                    button.disabled = false;
                });
            }
        }

        buttons.forEach((button) => {
            button.addEventListener("click", () => sendAction(button.dataset.action));
        });

        loadStatus();
    </script>
</body>
</html>
